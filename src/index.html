<!DOCTYPE html>
<html lang="en-US">

<head>
  <meta charset="utf-8">
  <title>MARY'S PLAYGROUND</title>
  <meta id="appName" name="application-name" content="MARY'S PLAYGROUND">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <base href="<%= htmlWebpackPlugin.options.baseHref %>">
  <link rel="icon" type="image/png" href="images/favicon.png">
  <script type="text/javascript">
    // GitHub Pages SPA: restore path after 404.html redirect (see public/404.html).
    (function (l) {
      if (l.search.length > 1 && l.search[1] === '/') {
        var decoded = l.search
          .slice(1)
          .split('&')
          .map(function (s) {
            return s.replace(/~and~/g, '&');
          })
          .join('?');
        window.history.replaceState(null, null, l.pathname.slice(0, -1) + decoded + l.hash);
      }
    })(window.location);
  </script>
</head>

<body>
  <noscript>Enabling JavaScript is required to run this app.</noscript>
  <div id="root"></div>
</body>

</html>
