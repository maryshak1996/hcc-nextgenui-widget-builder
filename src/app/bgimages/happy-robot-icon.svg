<svg width="40" height="40" viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
  <!-- Square-ish head with roomy interior so strokes do not merge at small sizes -->
  <circle cx="20" cy="3.5" r="2" fill="#6a6e73"/>
  <line x1="20" y1="5.5" x2="20" y2="10.5" stroke="#6a6e73" stroke-width="2" stroke-linecap="round"/>
  <rect x="7" y="11" width="26" height="20" rx="5" fill="none" stroke="#6a6e73" stroke-width="2" stroke-linejoin="round"/>
  <!-- Eyes: wider spacing, inset from sides -->
  <circle cx="14" cy="21" r="2.25" fill="#6a6e73"/>
  <circle cx="26" cy="21" r="2.25" fill="#6a6e73"/>
  <!-- Smile: sits above bottom edge (control was y=31 = face bottom — pulled up for clearance) -->
  <path d="M12 26 Q20 28.25 28 26" stroke="#6a6e73" stroke-width="1.85" fill="none" stroke-linecap="round"/>
</svg>
